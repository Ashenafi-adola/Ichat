{% extends 'accounts/home.html' %}

{% block chat %}
<div class="d-flex justify-content-center align-items-center vh-100">
    <div class="card shadow-lg" style="max-width: 500px; width: 100%;">
        <div class="card-header bg-danger text-white">
            <h5 class="card-title mb-0">Delete Message</h5>
        </div>
        <div class="card-body">
            <form action="" method="post">
                {% csrf_token %}
                <div class="alert alert-warning" role="alert">
                    <strong>Warning!</strong> Are you sure you want to delete the message: "<em>{{message.body}}</em>"?
                </div>
                <div class="d-flex justify-content-end gap-2">
                    <a href="{{request.META.HTTP_REFERER}}" class="btn btn-secondary">Cancel</a>
                    <input type="submit" value="Delete" class="btn btn-danger">
                </div>
            </form>
        </div>
    </div>
</div>
{{ friend.username|json_script:"friend-name" }}
{{ user.username|json_script:"current-username" }}
<script>
    const friendName = JSON.parse(document.getElementById('friend-name').textContent);
    const currentUsername = JSON.parse(document.getElementById('current-username').textContent);
    const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    
    const groupSocket = new WebSocket(
         wsProtocol + '//' + window.location.host + '/ws/friend/' + friendName + '/'
     );
</script>
{% endblock %}
